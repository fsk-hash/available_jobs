<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسین ای-سروسز - دستیاب جابز (ڈارک موڈ)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', 'Noto Nastaliq Urdu', sans-serif;
            background-color: #121212; /* گہرا کالا بیک گراؤنڈ */
            color: #e0e0e0; /* ہلکا سفید ٹیکسٹ */
            padding: 10px;
            direction: rtl;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: #1e1e1e; /* کارڈز اور مین کنٹینر کا بیک گراؤنڈ */
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #3792ff;
            padding-bottom: 15px;
        }

        header h1 {
            color: #3792ff; /* چمکدار نیلا رنگ جو ڈارک موڈ پر واضح دیکھے */
            font-size: 2rem;
            margin-bottom: 5px;
        }

        header h2 {
            color: #b0b0b0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* ڈیسک ٹاپ ٹیبل ڈیزائن */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            margin-top: 10px;
        }

        th, td {
            padding: 12px 15px;
            border: 1px solid #333333;
        }

        th {
            background-color: #1a73e8;
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #252525;
        }

        .btn-apply {
            background-color: #00c853; /* چمکدار سبز بٹن */
            color: #000000; /* بٹن کے اندر کالا ٹیکسٹ تاکہ پڑھنے میں آسانی ہو */
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-apply:hover {
            background-color: #00e676;
            transform: scale(1.02);
        }

        /* 📱 موبائل اسکرین کے لیے ڈارک موڈ کارڈ لے آؤٹ */
        @media screen and (max-width: 768px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tr {
                background: #252525;
                border: 2px solid #3792ff; /* نیلے بارڈر کے ساتھ جاب کارڈ */
                border-radius: 8px;
                margin-bottom: 15px;
                padding: 12px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            }

            tr:nth-child(even) {
                background-color: #252525;
            }

            td {
                border: none;
                border-bottom: 1px solid #333;
                position: relative;
                padding-left: 50%;
                text-align: left; /* جاب کی معلومات بائیں طرف */
                padding-top: 10px;
                padding-bottom: 10px;
                font-size: 1rem;
                color: #e0e0e0;
            }

            /* موبائل پر دائیں طرف آنے والے لیبلز */
            td:before {
                position: absolute;
                top: 10px;
                right: 10px;
                width: 45%;
                padding-left: 10px;
                white-space: nowrap;
                text-align: right;
                font-weight: bold;
                color: #3792ff; /* لیبل کا رنگ نیلا */
            }

            td:nth-of-type(1):before { content: "Job ID:"; }
            td:nth-of-type(2):before { content: "Designation:"; }
            td:nth-of-type(3):before { content: "Department:"; }
            td:nth-of-type(4):before { content: "Last Date:"; }
            td:nth-of-type(5):before { content: "Apply Fee:"; }
            td:nth-of-type(6):before { content: "Action:"; }

            td:last-child {
                border-bottom: none;
                text-align: center;
                padding-left: 0;
                padding-top: 15px;
            }
        }

        /* واٹس ایپ سیکشن (ڈارک تھیم کے مطابق) */
        .whatsapp-section {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #16291a; /* ہلکا گہرا سبز جو ڈارک موڈ پر اچھا لگے */
            border-radius: 8px;
            border: 1px solid #2e5c38;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
            transition: background-color 0.2s, transform 0.2s;
        }

        .whatsapp-btn:hover {
            background-color: #1ebd54;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>حسین ای-سروسز</h1>
        <h2>Available Jobs to Apply</h2>
    </header>

    <table>
        <thead>
            <tr>
                <th>Job ID</th>
                <th>Designation</th>
                <th>Department</th>
                <th>Last Date</th>
                <th>Apply Fee</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="jobs-table-body">
            </tbody>
    </table>

    <div class="whatsapp-section">
        <p style="font-size: 1.05rem; line-height: 1.8; text-align: justify; color: #b8e2c0;">
            اپلائی کروانے کے لیے نیچے واٹس ایپ کے بٹن پر کلک کر کے چیٹ ونڈو میں میسج پیسٹ (Paste) کر کے ہمارے نمائندے کو بھیج دیں۔ شکریہ۔
        </p>
        <a href="https://wa.me/923001234567" target="_blank" class="whatsapp-btn">
            💬 واٹس ایپ پر رابطہ کریں
        </a>
    </div>
</div>

<script>
    // 25 فرضی جابز کا ڈیٹا
    const jobsData = [
        { id: "HE-001", title: "Data Entry Operator", dept: "Education", date: "10-07-2026", fee: "Rs. 300" },
        { id: "HE-002", title: "Junior Clerk", dept: "Revenue", date: "12-07-2026", fee: "Rs. 400" },
        { id: "HE-003", title: "Computer Operator", dept: "Health", date: "15-07-2026", fee: "Rs. 350" },
        { id: "HE-004", title: "Assistant", dept: "Police", date: "18-07-2026", fee: "Rs. 500" },
        { id: "HE-005", title: "Sub-Inspector", dept: "Police", date: "20-07-2026", fee: "Rs. 600" },
        { id: "HE-006", title: "Stenographer", dept: "Courts", date: "22-07-2026", fee: "Rs. 400" },
        { id: "HE-007", title: "Accountant", dept: "Finance", date: "25-07-2026", fee: "Rs. 500" },
        { id: "HE-008", title: "Library Assistant", dept: "Higher Education", date: "28-07-2026", fee: "Rs. 300" },
        { id: "HE-009", title: "Lab Technician", dept: "Health", date: "30-07-2026", fee: "Rs. 450" },
        { id: "HE-010", title: "Driver", dept: "Rescue 1122", date: "02-08-2026", fee: "Rs. 200" },
        { id: "HE-011", title: "Security Guard", dept: "WAPDA", date: "05-08-2026", fee: "Rs. 150" },
        { id: "HE-012", title: "Store Keeper", dept: "Railways", date: "08-08-2026", fee: "Rs. 300" },
        { id: "HE-013", title: "Naib Qasid", dept: "Irrigation", date: "10-08-2026", fee: "Rs. 100" },
        { id: "HE-014", title: "Primary School Teacher", dept: "School Education", date: "15-08-2026", fee: "Rs. 450" },
        { id: "HE-015", title: "Senior Clerk", dept: "Excise & Taxation", date: "18-08-2026", fee: "Rs. 500" },
        { id: "HE-016", title: "Statistical Assistant", dept: "Bureau of Stats", date: "20-08-2026", fee: "Rs. 400" },
        { id: "HE-017", title: "IT Technician", dept: "PITB", date: "22-08-2026", fee: "Rs. 500" },
        { id: "HE-018", title: "Supervisor", dept: "Social Welfare", date: "25-08-2026", fee: "Rs. 350" },
        { id: "HE-019", title: "Auditor", dept: "Local Government", date: "28-08-2026", fee: "Rs. 600" },
        { id: "HE-020", title: "Draftsman", dept: "C&W Department", date: "30-08-2026", fee: "Rs. 400" },
        { id: "HE-021", title: "Gate Keeper", dept: "Forest Department", date: "02-09-2026", fee: "Rs. 150" },
        { id: "HE-022", title: "Receptionist", dept: "Tourism", date: "05-09-2026", fee: "Rs. 300" },
        { id: "HE-023", title: "Junior Engineer", dept: "Pesco/Lesco", date: "10-09-2026", fee: "Rs. 700" },
        { id: "HE-024", title: "Field Assistant", dept: "Agriculture", date: "12-09-2026", fee: "Rs. 250" },
        { id: "HE-025", title: "Telephone Operator", dept: "PTCL", date: "15-09-2026", fee: "Rs. 300" }
    ];

    const tableBody = document.getElementById('jobs-table-body');
    
    jobsData.forEach(job => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><strong>${job.id}</strong></td>
            <td>${job.title}</td>
            <td>${job.dept}</td>
            <td>${job.date}</td>
            <td>${job.fee}</td>
            <td><button class="btn-apply" onclick="copyJobDetails('${job.id}', '${job.title}', '${job.dept}', '${job.date}', '${job.fee}')">I Want to Apply</button></td>
        `;
        tableBody.appendChild(row);
    });

    function copyJobDetails(id, title, dept, date, fee) {
        const detailsText = `السلام علیکم! مجھے اس جاب کے لیے اپلائی کروانا ہے۔:\n\n` +
                            `📌 جاب آئی ڈی: ${id}\n` +
                            `💼 عہدہ (Designation): ${title}\n` +
                            `🏢 محکمہ (Department): ${dept}\n` +
                            `📅 آخری تاریخ: ${date}\n` +
                            `💰 اپلائی فیس: ${fee}\n\n` +
                            `براہ کرم میری درخواست کا پراسیس شروع کریں۔`;

        navigator.clipboard.writeText(detailsText).then(() => {
            alert("آپ کا آرڈر کاپی ہوچکا ہے۔\n\nاپلائی کروانے کے لیے نیچے واٹس ایپ کے بٹن پر کلک کر کے چیٹ ونڈو میں میسج پیسٹ کر کے ہمارے نمائندے کو بھیج دیں۔ شکریہ۔");
        }).catch(err => {
            console.error('کاپی کرنے میں خرابی آئی: ', err);
            alert("ڈیٹا کاپی نہیں ہو سکا۔ آپ مینولی رابطہ کر سکتے ہیں۔");
        });
    }
</script>

</body>
</html>
