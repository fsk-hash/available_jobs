<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs List - Hussain E-Services</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* پورے پیج کو سکرول ہونے سے روکنے کے لیے */
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            /* 🌟 ایپ تھیم کے مطابق صاف ستھرا لائٹ گریڈئینٹ بیک گراؤنڈ */
            background: linear-gradient(-45deg, #f4f6f9, #eef2f7, #e2e8f0, #f8fafc);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: #1e252b; /* گہرا ٹیکسٹ واضح نظر آنے کے لیے */
            padding: 8px;
            display: flex;
            flex-direction: column;
        }

        /* 🌟 گریڈئینٹ کی موومنٹ کے لیے اینیمیشن کی فریمز */
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.8); /* سفید شیشے جیسا تاثر (Glassmorphism) */
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(15, 43, 56, 0.1);
            box-shadow: 0 8px 32px rgba(15, 43, 56, 0.08);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-container {
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 10px 15px;
            font-size: 14px;
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: #ffffff;
            border: 2px solid #cbd5e1;
            color: #1e252b;
            border-radius: 30px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }

        .search-box:focus {
            border-color: #0f2b38; /* ایپ کا مین گہرا نیلا رنگ */
            box-shadow: 0 0 10px rgba(15, 43, 56, 0.15);
        }

        .table-responsive {
            width: 100%;
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 10px;
            direction: ltr; /* سکرول بار دائیں طرف رکھنے کے لیے */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            text-align: right;
            direction: rtl;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(15, 43, 56, 0.08);
            font-size: 14px;
            vertical-align: middle;
        }

        th {
            background-color: #0f2b38; /* ایپ کا مین گہرا نیلا ہیڈر */
            color: #ffffff; 
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:nth-child(odd) {
            background-color: rgba(255, 255, 255, 0.5);
        }

        tr:nth-child(even) {
            background-color: rgba(241, 245, 249, 0.6);
        }

        .job-id {
            font-family: arial;
            font-weight: bold;
            color: #0f2b38; /* گہرا نیلا ٹیکسٹ */
            background: #f2e311; /* ایپ کا پیلا رنگ بیک گراؤنڈ میں */
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 13px;
            display: inline-block;
            direction: ltr;
        }

        .fee-badge {
            background: #e2e8f0;
            color: #0f2b38;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            border: 1px solid #cbd5e1;
        }

        .free-badge {
            background: #d1fae5;
            color: #065f46;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
        }

        .date-badge {
            background: #f1f5f9;
            color: #475569;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #e2e8f0;
            display: inline-block;
        }

        .copy-btn {
            background-color: #0f2b38; /* ایپ کا گہرا نیلا رنگ */
            color: #ffffff; 
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            font-family: 'Noto Sans Arabic', sans-serif;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background-color: #163645;
            box-shadow: 0 4px 12px rgba(15, 43, 56, 0.2);
        }

        .no-result {
            display: none;
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 16px;
            font-weight: bold;
        }

        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f2b38; /* گہرا نیلا نوٹیفکیشن */
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 2000;
            text-align: center;
            width: 90%;
            max-width: 400px;
            direction: rtl;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .toast-notification.show {
            opacity: 1;
            visibility: visible;
        }

        /* 📱 موبائل ریسپانسو ویو */
        @media screen and (max-width: 768px) {
            table thead {
                display: none;
            }

            table, tbody, tr, td {
                display: block;
                width: 100%;
            }

            tr {
                margin-bottom: 12px;
                border: 1px solid #e2e8f0;
                border-radius: 12px;
                padding: 10px 12px;
                background: #ffffff;
                box-shadow: 0 4px 6px rgba(15, 43, 56, 0.03);
                transition: transform 0.2s ease;
            }

            tr:active {
                transform: scale(1.01);
                background: #f8fafc;
                border-color: #0f2b38;
            }

            td {
                text-align: left;
                padding-right: 45%;
                padding-left: 0px;
                padding-top: 8px;
                padding-bottom: 8px;
                position: relative;
                border-bottom: 1px dashed #edf2f7;
                font-size: 13px;
                min-height: 38px;
                color: #334155;
            }

            td:last-child {
                border-bottom: none;
                padding-right: 0;
                padding-left: 0;
                padding-top: 10px;
                text-align: center;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                right: 5px;
                left: auto;
                width: 40%;
                text-align: right;
                font-weight: bold;
                color: #64748b;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div id="toast" class="toast-notification">آرڈر کاپی ہو چکا ہے! نیچے واٹس ایپ کے بٹن پر کلک کریں اور چیٹ ونڈو کھلنے پر اپنا آرڈر Paste کر کے E-Services کو بھیج دیں تاکہ آپ کی درخواست پر کام شروع کیا جاسکے۔ شکریہ۔</div>

<div class="container">

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="یہاں سرچ کریں (عہدہ، محکمہ، فیس )...">
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Job ID</th>
                    <th>عہدہ</th>
                    <th>محکمہ / ادارہ</th>
                    <th>تعلیم</th>
                    <th>آخری تاریخ</th>
                    <th>Apply Fee</th>
                    <th>اپلائی بٹن</th>
                </tr>
            </thead>
            <tbody id="jobsTableBody">
            </tbody>
        </table>
    </div>

    <div id="noResult" class="no-result">کوئی مماثلت نہیں ملی!</div>
</div>

<script>
    const jobsData = [
        { designation: "جونیئر کلرک", department: "محکمہ تعلیم (Education Department)", education: "گریجوایٹ", deadline: "15-07-2026", fee: "300" },
        { designation: "کمپیوٹر آپریٹر", department: "محکمہ صحت (Health Department)", education: "انٹرمیڈیٹ", deadline: "15-07-2026", fee: "500" },
        { designation: "سافٹ ویئر ڈویلپر", department: "پنجاب آئی ٹی بورڈ (PITB)", education: "بی ایس سی ایس", deadline: "15-07-2026", fee: "1000" },
        { designation: "اسسٹنٹ ڈائریکٹر", department: "محکمہ زراعت (Agriculture Department)", education: "ماسٹرز", deadline: "15-07-2026", fee: "600" },
        { designation: "سیکیورٹی گارڈ", department: "لوکل گورنمنٹ (Local Government)", education: "میٹرک", deadline: "15-07-2026", fee: "100" },
        { designation: "اکاؤنٹنٹ", department: "محکمہ مال (Revenue Department)", education: "بی کام", deadline: "14-07-2026", fee: "400" },
        { designation: "ڈیٹا انٹری آپریٹر", department: "پولیس ڈیپارٹمنٹ (Police)", education: "انٹرمیڈیٹ", deadline: "15-07-2026", fee: "300" },
        { designation: "سب انسپکٹر", department: "پنجاب پولیس (Punjab Police)", education: "گریجوایٹ", deadline: "15-07-2026", fee: "500" },
        { designation: "لیڈی ہیلتھ وزٹر", department: "پرائمری Health کیئر", education: "ڈپلومہ", deadline: "15-07-2026", fee: "500" },
        { designation: "سوشل میڈیا مینیجر", department: "محکمہ اطلاعات و ثقافت", education: "گریجوایٹ", deadline: "15-07-2026", fee: "500" },
        { designation: "ای سروسز آپریٹر", department: "ای سروسز", education: "گریجویٹ", deadline: "کوئی آخری تاریخ نہیں", fee: "Free" },
    ];

    function loadJobs() {
        const tableBody = document.getElementById('jobsTableBody');
        tableBody.innerHTML = '';

        jobsData.forEach((job, index) => {
            const jobId = `ESJ-${1001 + index}`;
            const feeText = job.fee.toLowerCase() === 'free' ? 'Free' : `Rs. ${job.fee}`;
            
            const copyText = `السلام علیکم! مجھے اس جاب پر اپلائی کروانا ہے:\n\n جاب آئی ڈی: ${jobId}\n عہدہ: ${job.designation}\n محکمہ: ${job.department}\n تعلیم: ${job.education || '-'}\n فیس: ${feeText}\n آخری تاریخ: ${job.deadline}`;

            let feeDisplay = job.fee.toLowerCase() === 'free' 
                ? `<span class="free-badge">Free</span>` 
                : `<span class="fee-badge">Rs. ${job.fee}</span>`;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td data-label="Job ID"><span class="job-id">${jobId}</span></td>
                <td data-label="عہدہ"><big><big><strong>${job.designation}</strong></big></big></td>
                <td data-label="محکمہ / ادارہ">${job.department}</td>
                <td data-label="تعلیم">${job.education || '-'}</td>
                <td data-label="آخری تاریخ"><span class="date-badge">${job.deadline}</span></td>
                <td data-label="Apply Fee">${feeDisplay}</td>
                <td>
                    <button type="button" class="copy-btn" onclick="copyJobDetails(\`${copyText.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`\)">
                        جاب اپلائی کروائیں
                    </button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    function copyJobDetails(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }).catch(err => {
            alert('تفصیلات کاپی کرنے میں مسئلہ آیا ہے، دوبارہ کوشش کریں۔');
        });
    }

    document.getElementById('searchInput').addEventListener('keyup', function() {
        const filter = this.value.toLowerCase().trim();
        const rows = document.querySelectorAll('#jobsTableBody tr');
        let hasVisibleRow = false;

        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            if (text.includes(filter)) {
                row.style.display = ''; 
                hasVisibleRow = true;
            } else {
                row.style.display = 'none'; 
            }
        });

        const noResult = document.getElementById('noResult');
        noResult.style.display = hasVisibleRow ? 'none' : 'block';
    });

    loadJobs();
</script>

</body>
</html>
