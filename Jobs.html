<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs List - Hussain Services</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-weight: 700;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            display: inline-block;
            width: 100%;
        }

        .search-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 16px;
            font-family: 'Noto Sans Arabic', sans-serif;
            border: 2px solid #bdc3c7;
            border-radius: 30px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: left;
        }

        .search-box:focus {
            border-color: #3498db;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: left;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 15px;
            vertical-align: middle;
        }

        th {
            background-color: #2c3e50;
            color: #ffffff;
            font-weight: 700;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tr:hover {
            background-color: #edf7fe;
            transition: background-color 0.2s ease;
        }

        .job-id {
            font-family: monospace;
            font-weight: bold;
            color: #e67e22;
            background: #fdf2e9;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .fee-badge {
            background: #ebf5fb;
            color: #2980b9;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        .free-badge {
            background: #e8f8f5;
            color: #27ae60;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        .date-badge {
            background: #fef9e7;
            color: #b7950b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
        }

        .apply-btn {
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .apply-btn:hover {
            background-color: #128c7e;
            transform: translateY(-1px);
        }

        .no-result {
            display: none;
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>دستیاب نوکریوں کی لسٹ</h1>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="Search here (Designation, Department, Fee or ID)...">
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Job ID</th>
                    <th>ڈیزگنیشن (عہدہ)</th>
                    <th>محکمہ / ادارہ</th>
                    <th>آخری تاریخ</th>
                    <th>Apply Fee</th>
                    <th>ایکشن (Action)</th>
                </tr>
            </thead>
            <tbody id="jobsTableBody">
                </tbody>
        </table>
    </div>

    <div id="noResult" class="no-result">No matching jobs found!</div>
</div>

        { designation: "سروئیر (Surveyor)", department: "سرحد ڈویلپمنٹ اتھارٹی", deadline: "2026-07-29", fee: "400" },
        { designation: "مترجم (Translator)", department: "دارالترجمہ پنجاب", deadline: "2026-08-06", fee: "500" },
        { designation: "پرنٹنگ مینیجر", department: "گورنمنٹ پریس پاکستان", deadline: "2026-08-13", fee: "600" }
    ];

    const whatsappNumber = "03106167300";

    function loadJobs() {
        const tableBody = document.getElementById('jobsTableBody');
        tableBody.innerHTML = '';

        jobsData.forEach((job, index) => {
            const jobId = `JOB-${1001 + index}`;
            const messageText = `مجھے "${jobId}" پر اپلائی کروانا ہے۔`;
            const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(messageText)}`;

            let feeDisplay = '';
            if(job.fee.toLowerCase() === 'free') {
                feeDisplay = `<span class="free-badge">Free</span>`;
            } else {
                feeDisplay = `<span class="fee-badge">Rs. ${job.fee}</span>`;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="job-id">${jobId}</span></td>
                <td><strong>${job.designation}</strong></td>
                <td>${job.department}</td>
                <td><span class="date-badge">${job.deadline}</span></td>
                <td>${feeDisplay}</td>
                <td>
                    <a href="${whatsappUrl}" target="_blank" class="apply-btn">
                        اپلائی کروائیں 💬
                    </a>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    document.getElementById('searchInput').addEventListener('keyup', function() {
        const filter = this.value.toLowerCase().trim();
        const rows = document.querySelectorAll('#jobsTableBody tr');
        let hasVisibleRow = false;

        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            if (text.includes(filter)) {
                row.style.display = ''; 
                hasVisibleRow = true;
            } else {
                row.style.display = 'none'; 
            }
        });

        const noResult = document.getElementById('noResult');
        if (hasVisibleRow) {
            noResult.style.display = 'none';
        } else {
            noResult.style.display = 'block';
        }
    });

    loadJobs();
</script>

</body>
</html>
